<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JobTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>Job-Tracker</h1>
  <p>Smart job tracking for modern job seekers</p>
</header>

<main class="container">

  <!-- FORM CARD -->
  <div class="card form-card">
    <h2>Add Application</h2>

    <form id="jobForm">
      <label>Company</label>
      <input type="text" id="company" required>

      <label>Role</label>
      <input type="text" id="role" required>

      <label>Status</label>
      <select id="status">
        <option>Applied</option>
        <option>Interview</option>
        <option>Offer</option>
        <option>Rejected</option>
      </select>

      <label>Notes</label>
      <textarea id="notes"></textarea>

      <button type="submit">Save Application</button>
    </form>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="stat total">
      <h3>Total</h3>
      <p id="total">0</p>
    </div>
    <div class="stat interview">
      <h3>Interviews</h3>
      <p id="interview">0</p>
    </div>
    <div class="stat offer">
      <h3>Offers</h3>
      <p id="offer">0</p>
    </div>
    <div class="stat rejected">
      <h3>Rejected</h3>
      <p id="rejected">0</p>
    </div>
  </div>

  <!-- SEARCH -->
  <input type="text" id="search" placeholder="🔍 Search company...">

  <!-- JOB LIST -->
  <div id="jobList"></div>

</main>

<footer>
  <p>© 2026 Abdul Rahaman Salifu</p>
</footer>

<script src="script.js"></script>
</body>
</html>
